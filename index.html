<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IP Insights | Discover Your Connection</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <main class="container">
        <header class="glass-panel text-center">
            <h1>Your Public IP</h1>
            <div id="ip-display" class="skeleton-text">Loading...</div>
            <p id="isp-display" class="subtitle"></p>
        </header>

        <div class="grid-layout">
            <section class="glass-panel">
                <h2>Connection Details</h2>
                <div class="details-grid" id="details-container">
                    <!-- Populated by JS -->
                </div>
            </section>

            <section class="glass-panel">
                <h2>Location Map</h2>
                <div id="map" class="map-container skeleton-box"></div>
            </section>
        </div>

        <section class="glass-panel history-section">
            <h2>IP History</h2>
            <p class="history-desc">Previous IP addresses detected from this browser.</p>
            <div id="history-container" class="history-list">
                <!-- Populated by JS -->
            </div>
        </section>
    </main>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="script.js"></script>
</body>
</html>
